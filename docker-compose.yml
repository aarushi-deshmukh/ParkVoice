version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
      - backend_models:/app/models
      - backend_uploads:/app/uploads
    environment:
      - APP_NAME=ParkVoice AI
      - APP_VERSION=1.0.0
      - DEBUG=False
      - DATABASE_URL=sqlite+aiosqlite:////app/data/parkvoice.db
      - UPLOAD_DIR=/app/uploads
      - MODEL_DIR=/app/models
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend_data:
  backend_models:
  backend_uploads:
